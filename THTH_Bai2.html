<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc nghiệm Từ Vựng THTH Trung Cấp 4 - Bài 2</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f2f8f4; /* Nền xanh lá nhạt */
            color: #333; 
            margin: 0; 
            padding: 20px; 
            font-size: 16px; 
        }
        .container { max-width: 95%; margin: 0 auto; } 
        h1 { text-align: center; color: #2e7d32; font-size: 1.8em; margin-bottom: 20px; line-height: 1.4;}
        
        /* Bảng điểm ghim trên cùng */
        .score-banner {
            position: sticky;
            top: 10px;
            background: #e67e22; /* Cam gỗ ấm */
            color: #fff;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2em;
            font-weight: bold;
            z-index: 100;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #retry-btn {
            background: #c0392b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            display: none; /* Ẩn mặc định */
            transition: 0.3s;
        }
        #retry-btn:hover { background: #e74c3c; }

        /* Khung Danh Mục Chủ Đề */
        .category-title {
            font-size: 1.4em;
            color: #27ae60;
            border-bottom: 2px solid #27ae60;
            padding-bottom: 5px;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        /* --- KHUNG CÂU HỎI --- */
        .question-card { 
            background: #fff; 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.08); 
            border-top: 5px solid #2ecc71; 
        }
        .q-header { 
            font-size: 0.9em; 
            color: #7f8c8d; 
            font-weight: bold; 
            margin-bottom: 10px; 
            text-transform: uppercase;
        }
        .badge {
            background: #d4efdf;
            color: #1e8449;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            margin-left: 10px;
        }
        .q-word { 
            font-size: 2.5em; 
            font-weight: bold; 
            color: #2e7d32; 
            margin-bottom: 15px; 
            text-align: center; 
        }
        
        /* Lưới đáp án */
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
        
        .opt-btn { 
            padding: 15px; font-size: 1.1em; border: 2px solid #a9dfbf; 
            border-radius: 8px; background: #fff; cursor: pointer; 
            transition: 0.2s; text-align: center; font-weight: bold; color: #34495e;
        }
        .opt-btn:hover:not(:disabled) { border-color: #27ae60; background: #e8f8f5; }
        .opt-btn:disabled { cursor: default; }
        .opt-btn.correct { background: #d4edda; border-color: #28a745; color: #155724; }
        .opt-btn.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        
        /* --- KHUNG GIẢI THÍCH CHI TIẾT --- */
        .explanation { 
            margin-top: 15px; 
            padding: 15px; 
            border-radius: 8px; 
            background: #fdfefe; 
            border-left: 5px solid #e67e22; 
            line-height: 1.6;
            display: none;
            animation: fadeIn 0.4s ease-in-out;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }

        .correct-ans { 
            color: #d35400; 
            font-size: 1.3em; 
            display: block; 
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .example-box {
            background: #fef5e7; 
            padding: 15px; 
            border-radius: 6px; 
            margin-bottom: 15px; 
            border-left: 4px solid #e67e22;
        }
        .example-box .ex-header strong { color: #d35400; }
        .example-box .kr-ex { font-weight: bold; font-size: 1.2em; color: #2e7d32; display: block; margin-top: 5px; }
        .example-box .vn-ex { font-size: 1.1em; color: #34495e; margin-top: 8px; border-top: 1px dashed #bdc3c7; padding-top: 8px; }

        .han-viet-box {
            background: #eafaf1; 
            color: black; 
            padding: 12px; 
            border-radius: 5px; 
            font-size: 1.1em; 
            border: 1px solid #a3e4d7;
        }
        .han-viet-box span { font-weight: bold; color: #117a65; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Trắc nghiệm Từ vựng: 집안일 (Công việc nhà) <br> Tiếng Hàn Tổng Hợp Trung Cấp 4 - Bài 2</h1>
    
    <div class="score-banner">
        <span id="score-text">Điểm: 0 / 0 (Đã làm: 0)</span>
        <button id="retry-btn" onclick="retryWrongQuestions()">🔄 Làm lại câu sai</button>

    <div id="quiz-container"></div>
</div>

// Tạo bộ câu hỏi với distractors
let allQuestions = [];
rawVocabList.forEach((item, index) => {
    let pool = rawVocabList.filter((_, i) => i !== index);
    pool.sort(() => 0.5 - Math.random());
    
    // Lấy 3 đáp án sai ngẫu nhiên
    let distractors = [pool[0].vn, pool[1].vn, pool[2].vn];
    let options = [...distractors, item.vn];
    options.sort(() => 0.5 - Math.random()); // Xáo trộn đáp án
    
    allQuestions.push({
        id: index,
        kr: item.kr,
        cat: item.cat,
        options: options,
        correctIndex: options.indexOf(item.vn),
        answerText: item.vn,
        ex_kr: item.ex_kr,
        ex_vn: item.ex_vn,
        han: item.han
    });
});

let score = 0;
let answeredCount = 0;
let wrongQuestionIds = []; // Mảng lưu các ID câu trả lời sai
const container = document.getElementById('quiz-container');

// Hàm render giao diện (hiển thị danh sách câu hỏi được truyền vào)
function renderQuiz(questionsToRender) {
    container.innerHTML = '';
    let currentCategory = '';

    // Sắp xếp tạm theo Category để nhóm lại cho đẹp nếu đang làm mảng full
    let sortedQuestions = [...questionsToRender].sort((a, b) => a.cat.localeCompare(b.cat));

    sortedQuestions.forEach((q, displayIndex) => {
        // In ra tiêu đề chủ đề nếu nó khác chủ đề trước đó
        if (q.cat !== currentCategory) {
            currentCategory = q.cat;
            container.innerHTML += `<div class="category-title">📚 Chủ đề: ${currentCategory}</div>`;
        }

        // Tạo khung HTML
        let html = `
        <div class="question-card" id="q-card-${q.id}">
            <div class="q-header">Câu hỏi <span class="badge">${q.cat}</span></div>
            <div class="q-word">${q.kr}</div>
            <div class="options" id="opts-${q.id}">
                ${q.options.map((opt, oIndex) => `
                    <button class="opt-btn" onclick="checkAns(${q.id}, ${oIndex}, this)">${opt}</button>
                `).join('')}
            </div>
            
            <div class="explanation" id="exp-${q.id}">
                <strong class="correct-ans">✅ Đáp án đúng: ${q.answerText}</strong>
                <div class="example-box">
                    <div class="ex-header">📖 <strong>Ví dụ:</strong></div>
                    <span class="kr-ex">"${q.ex_kr}"</span>
                    <div class="vn-ex">➔ ${q.ex_vn}</div>
                </div>
                <div class="han-viet-box">🔍 <strong>Từ nguyên:</strong> ${q.han}</div>
            </div>
        </div>
        `;
        container.innerHTML += html;
    });
}

// Kiểm tra đáp án
function checkAns(questionId, selectedIndex, btnElement) {
    // Tìm object câu hỏi theo ID
    const q = allQuestions.find(item => item.id === questionId);
    
    const optionsDiv = document.getElementById(`opts-${questionId}`);
    const buttons = optionsDiv.querySelectorAll('.opt-btn');
    
    // Khóa nút
    buttons.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === q.correctIndex) {
            btn.classList.add('correct');
        } else if (idx === selectedIndex) {
            btn.classList.add('wrong');
        }
    });
    
    // Cập nhật logic điểm và câu sai
    answeredCount++;
    if (selectedIndex === q.correctIndex) {
        score++;
    } else {
        // Nếu trả lời sai, thêm ID vào mảng wrongQuestionIds (nếu chưa có)
        if (!wrongQuestionIds.includes(questionId)) {
            wrongQuestionIds.push(questionId);
        }
    }
    
    document.getElementById('score-text').innerText = `Điểm: ${score} / ${answeredCount}`;
    document.getElementById(`exp-${questionId}`).style.display = 'block';

    // Hiện nút "Làm lại câu sai" nếu có ít nhất 1 câu sai
    if (wrongQuestionIds.length > 0) {
        document.getElementById('retry-btn').style.display = 'inline-block';
    }
}

// Tính năng "Làm lại câu sai"
function retryWrongQuestions() {
    if (wrongQuestionIds.length === 0) return;

    // Lọc ra danh sách câu hỏi dựa trên các ID làm sai
    let retryList = allQuestions.filter(q => wrongQuestionIds.includes(q.id));
    
    // Render lại màn hình chỉ với các câu làm sai
    renderQuiz(retryList);
    
    // Reset bộ đếm điểm, nhưng làm trống mảng wrongQuestionIds để chấm lại từ đầu đợt retry này
    score = 0;
    answeredCount = 0;
    wrongQuestionIds = [];
    document.getElementById('score-text').innerText = `Điểm: 0 / 0 (Chế độ: Làm lại câu sai)`;
    document.getElementById('retry-btn').style.display = 'none';
    
    // Kéo mượt lên đầu trang
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Khởi chạy khi load trang
window.onload = () => {
    // Render toàn bộ dữ liệu ban đầu
    renderQuiz(allQuestions);
};
</script>
